<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto - Magazine Luiza</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="https://logodownload.org/wp-content/uploads/2015/12/magazine-luiza-logo.png" alt="Magazine Luiza" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="logo-fallback" style="display:none">magazine<br><span>luiza</span></span>
      </a>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Buscar em Magazine Luiza">
        <button onclick="window.location.href='index.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        </button>
      </div>
      <div class="header-actions">
        <a class="header-action" href="index.html">← Voltar</a>
        <a class="header-action cart-wrap" href="#">
          <div class="cart-icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span class="badge" id="cartBadge">0</span>
          </div>
          <span>Carrinho</span>
        </a>
      </div>
    </div>
  </div>
</header>

<div class="product-page">
  <div class="breadcrumb">
    <a href="index.html">Home</a> &rsaquo; <a href="#">Smartphones</a> &rsaquo; <span id="breadProduct">Produto</span>
  </div>

  <div class="product-detail-wrap">
    <!-- Gallery -->
    <div class="product-gallery">
      <div class="gallery-main">
        <img id="mainImg" src="" alt="Produto">
      </div>
      <div class="gallery-thumbs" id="galleryThumbs"></div>
    </div>

    <!-- Info -->
    <div class="product-detail-info">
      <div class="product-brand" id="detailBrand"></div>
      <h1 id="detailName"></h1>
      <div class="product-rating">
        <span class="stars" id="detailStars"></span>
        <span class="rating-count" id="detailRatingCount"></span>
        <a href="#reviews">Ver avaliações</a>
      </div>
      <div class="product-sku">SKU: <span id="detailSku"></span> | Vendido e entregue por <strong>Magazine Luiza</strong></div>

      <div class="price-box">
        <div class="price-old" id="detailOldPrice"></div>
        <div class="price-main" id="detailPrice"></div>
        <div class="price-pix" id="detailPix"></div>
        <div class="price-installment" id="detailInstallment"></div>
      </div>

      <div class="product-variants" id="detailVariants"></div>

      <div class="buy-actions">
        <button class="btn-buy" id="btnBuy">🛒 Comprar</button>
        <button class="btn-cart" id="btnCart">Adicionar ao Carrinho</button>
        <button class="btn-fav" id="btnFav">♡ Favoritar</button>
      </div>

      <div class="delivery-box">
        <h4>📦 Calcular Frete e Prazo</h4>
        <div class="cep-wrap">
          <input type="text" id="cepInput" placeholder="00000-000" maxlength="9">
          <button onclick="calcFrete()">OK</button>
        </div>
        <div id="freteResult"></div>
      </div>

      <div class="product-highlights" id="detailHighlights"></div>
    </div>
  </div>

  <!-- Description -->
  <div class="product-full-desc">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('desc')">Descrição</button>
      <button class="tab-btn" onclick="showTab('specs')">Especificações</button>
      <button class="tab-btn" onclick="showTab('reviews')">Avaliações</button>
    </div>
    <div class="tab-content active" id="tab-desc">
      <div id="detailDesc"></div>
    </div>
    <div class="tab-content" id="tab-specs">
      <table class="specs-table" id="detailSpecs"></table>
    </div>
    <div class="tab-content" id="tab-reviews">
      <div id="detailReviews"></div>
    </div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>🛒 Meu Carrinho</h3>
    <button onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<script src="app.js"></script>
<script>
  // Load product from URL param
  window.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id'));
    const product = PRODUCTS.find(p => p.id === id);
    if (!product) { document.querySelector('.product-page').innerHTML = '<p style="padding:40px;text-align:center">Produto não encontrado. <a href="index.html">Voltar</a></p>'; return; }

    document.title = product.name + ' - Magazine Luiza';
    document.getElementById('breadProduct').textContent = product.name;
    document.getElementById('mainImg').src = product.images[0];
    document.getElementById('detailBrand').textContent = product.brand;
    document.getElementById('detailName').textContent = product.name;
    document.getElementById('detailStars').textContent = '★'.repeat(Math.floor(product.rating)) + (product.rating % 1 ? '☆' : '') + '☆'.repeat(5 - Math.ceil(product.rating));
    document.getElementById('detailRatingCount').textContent = '(' + product.reviews + ' avaliações)';
    document.getElementById('detailSku').textContent = product.sku;
    document.getElementById('detailOldPrice').textContent = 'De: R$ ' + product.oldPrice.toFixed(2).replace('.',',');
    document.getElementById('detailPrice').innerHTML = 'R$ ' + product.price.toFixed(2).replace('.',',');
    document.getElementById('detailPix').textContent = '💚 R$ ' + (product.price * 0.95).toFixed(2).replace('.',',') + ' no Pix (5% off)';
    document.getElementById('detailInstallment').textContent = 'em 12x de R$ ' + (product.price / 12).toFixed(2).replace('.',',') + ' sem juros no Cartão Luiza';

    // Thumbs
    const thumbsEl = document.getElementById('galleryThumbs');
    product.images.forEach((img, i) => {
      const t = document.createElement('img');
      t.src = img; t.alt = 'Foto ' + (i+1);
      t.className = i === 0 ? 'active' : '';
      t.onclick = () => { document.getElementById('mainImg').src = img; thumbsEl.querySelectorAll('img').forEach(x => x.classList.remove('active')); t.classList.add('active'); };
      thumbsEl.appendChild(t);
    });

    // Highlights
    const hlEl = document.getElementById('detailHighlights');
    hlEl.innerHTML = '<ul>' + product.highlights.map(h => `<li>✓ ${h}</li>`).join('') + '</ul>';

    // Description
    document.getElementById('detailDesc').innerHTML = '<p>' + product.description + '</p>';

    // Specs
    const specsEl = document.getElementById('detailSpecs');
    specsEl.innerHTML = product.specs.map(s => `<tr><td>${s[0]}</td><td>${s[1]}</td></tr>`).join('');

    // Reviews
    const revEl = document.getElementById('detailReviews');
    revEl.innerHTML = product.reviewsData.map(r => `
      <div class="review-item">
        <div class="review-header"><strong>${r.user}</strong> <span>${'★'.repeat(r.rating)}</span> <small>${r.date}</small></div>
        <p>${r.comment}</p>
      </div>`).join('');

    // Variants
    if (product.variants && product.variants.length) {
      document.getElementById('detailVariants').innerHTML = '<div class="variant-label">Cor:</div><div class="variant-options">' + product.variants.map(v => `<button class="variant-btn">${v}</button>`).join('') + '</div>';
      document.querySelectorAll('.variant-btn').forEach(b => b.onclick = function(){ document.querySelectorAll('.variant-btn').forEach(x => x.classList.remove('active')); this.classList.add('active'); });
    }

    document.getElementById('btnBuy').onclick = () => { addToCart(product.name, product.price); openCart(); };
    document.getElementById('btnCart').onclick = () => { addToCart(product.name, product.price); openCart(); };
    document.getElementById('btnFav').onclick = function(){ this.textContent = this.textContent.includes('♡') ? '♥ Favoritado' : '♡ Favoritar'; this.style.color = this.textContent.includes('♥') ? 'red' : ''; };
  });

  function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    event.target.classList.add('active');
  }

  function calcFrete() {
    const cep = document.getElementById('cepInput').value.replace(/\D/g,'');
    if (cep.length !== 8) { document.getElementById('freteResult').innerHTML = '<p style="color:red">CEP inválido</p>'; return; }
    document.getElementById('freteResult').innerHTML = `
      <div class="frete-option"><span>🚚 Frete Grátis</span><span>Em até 7 dias úteis</span></div>
      <div class="frete-option"><span>⚡ Entrega Expressa</span><span>R$ 19,90 – amanhã</span></div>
      <div class="frete-option"><span>🏪 Retirar na Loja</span><span>Grátis – hoje</span></div>`;
  }
</script>
</body>
</html>
